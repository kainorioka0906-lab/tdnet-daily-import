name: TDnet Daily Downloader

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-tdnet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run TDnet downloader
        run: |
          python tdnet_downloader.py

      - name: Commit and push downloaded files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add tdnet_pdfs shares_cache.csv
          git commit -m "Add TDnet disclosures" || echo "No changes to commit"
          git push
